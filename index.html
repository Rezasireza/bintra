<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMA Plus Bina Trampil - SPMB 2026/2027</title>
    <!-- Google Fonts: Instrument Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS + Typography plugin via CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: {
                50: '#fdfce9',
                100: '#fdf8d4', // Signature cream
                200: '#fcf2b0',
                900: '#422006',
              },
              gold: {
                400: '#D4AF37',
                500: '#C8A24A', // Primary Accent
                600: '#A08035',
              },
              primary: {
                DEFAULT: '#111827', // Gray 900
                secondary: 'rgba(17,24,39,0.70)',
                tertiary: 'rgba(17,24,39,0.50)',
              }
            },
            fontFamily: {
              sans: ['"Instrument Sans"', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              'xl': '12px',
              '2xl': '16px',
              '3xl': '24px',
            },
            animation: {
              shine: 'shine var(--duration) infinite linear',
            },
            keyframes: {
              shine: {
                '0%': { backgroundPosition: '0% 0%' },
                '50%': { backgroundPosition: '100% 100%' },
                'to': { backgroundPosition: '0% 0%' },
              },
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  color: theme('colors.gray.600'),
                  h2: {
                    color: '#1a2340',
                    fontWeight: '700',
                    borderLeftWidth: '4px',
                    borderLeftColor: theme('colors.amber.400'),
                    paddingLeft: '1rem',
                    marginTop: '2rem',
                    marginBottom: '1rem',
                  },
                  h3: {
                    color: '#1a2340',
                    fontWeight: '700',
                  },
                  'ul > li::marker': {
                    color: theme('colors.amber.400'),
                  },
                  a: {
                    color: '#C8A24A',
                    '&:hover': { color: '#A08035' },
                  },
                  strong: { color: '#111827' },
                },
              },
            }),
          },
        },
      }
    </script>
    <style>
      /* Custom scrollbar for a premium feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      body {
        background-color: #FFFFFF;
        color: #111827;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
